# Stage 0 — scope and held-out boundary (canonical, BR-004)
# Operator mirror: .local/review/scope-boundary.md, held-out-topics.md, topic-matrix.csv

version: v1
effectiveDate: "2026-06-20"
heldOutTestSetVersion: held-out-v1

targetLanguages:
  JavaScript:
    inScope:
      summary: "ES2020+ modules, pure utilities, DOM helpers, validation, async fetch — no frameworks or Node servers"
      domainTags: [array, object, async, dom, validation, module, class, functional, error-handling]
      difficultyMix: { L1: 0.15, L2: 0.50, L3: 0.25, L4: 0.10 }
    outOfScopePhase1:
      - "React, Vue, Angular, Svelte, Solid, Astro, Next, Nuxt, Remix"
      - "Node.js HTTP servers (Express, Fastify, Koa, NestJS)"
      - "Bundler or build tool configuration (Webpack, Vite, Rollup)"
      - "ORM, database, or cloud SDK integration"
      - "Testing frameworks (Jest, Mocha, Cypress, Puppeteer)"
      - "TypeScript-only syntax (training targets plain JavaScript)"
  HTML:
    inScope:
      summary: "Semantic HTML5, forms, a11y basics, metadata, tables, media — structure only, minimal inline semantics"
      domainTags: [forms, semantic, accessibility, layout, metadata, tables, media]
      difficultyMix: { L1: 0.15, L2: 0.50, L3: 0.25, L4: 0.10 }
    outOfScopePhase1:
      - "Full CSS layout systems (Grid dashboards, Flex Holy Grail, Tailwind/Bootstrap pages)"
      - "SPA shells and Web Components"
      - "Canvas, WebGL, or animation-heavy pages"
      - "Email-client-compatible table layouts"
      - "PWA, service worker, or AMP-specific markup"
  FreeMarker:
    inScope:
      summary: "Macros, lists, includes, conditionals, formatting, nested templates — template logic only"
      domainTags: [macro, include, list, condition, formatting, nested, custom-directive]
      difficultyMix: { L1: 0.15, L2: 0.50, L3: 0.25, L4: 0.10 }
    outOfScopePhase1:
      - "Java/Spring backend integration (@Controller, Spring MVC, Security)"
      - "Database-driven dynamic includes or JPA entity graphs"
      - "Build artifact generators (pom.xml, docker-compose, Helm, Jenkins)"
      - "Non-HTML output templates (JSON API, XML SOAP, YAML configs)"
      - "Custom Java FreeMarker directive implementations"

